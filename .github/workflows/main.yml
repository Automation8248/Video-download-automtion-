name: Telegram Video Downloader

on:
  push:
    paths:
      - 'link.txt'
  # Yeh section manual trigger ke time dropdown menu banayega
  workflow_dispatch:
    inputs:
      quality:
        description: 'Kitne size/quality mein download karna chahte ho?'
        required: true
        default: '720p'
        type: choice
        options:
          - 1080p
          - 720p
          - 480p
          - 360p
          - best (Highest available)

jobs:
  download_and_send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -U yt-dlp requests

      - name: Run Video Downloader Script
        env:
          # Yahan TELEGRAM_TOKEN use kiya gaya hai
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Yahan hum selected quality ko Python script mein bhej rahe hain
          VIDEO_QUALITY: ${{ inputs.quality || '720p' }}
        run: python main.py
