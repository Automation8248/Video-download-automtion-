name: Telegram Video Downloader

# This tells GitHub WHEN to run the script
on:
  # 1. Runs automatically whenever you update the link.txt file
  push:
    paths:
      - 'link.txt'
  # 2. Adds a "Run workflow" button in GitHub so you can trigger it manually
  workflow_dispatch: 

jobs:
  download_and_send:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the code from your repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Step 3: Install FFmpeg (Crucial for merging 1080p/4K video and audio)
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      # Step 4: Install Python dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 5: Run your Python script with the Secrets attached
      - name: Run Video Downloader Script
        env:
          # These must match exactly what you named them in GitHub Secrets
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

     # Step 4: Install Python dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -U yt-dlp requests
